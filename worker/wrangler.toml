name = "babula-callback"
main = "callback.mjs"
compatibility_date = "2025-01-01"

# Custom domain route. Requires the zone `babulashotsrd.com` to be on this
# Cloudflare account, and a DNS record (CNAME or A/AAAA proxied) for
# `callback.babulashotsrd.com` pointing at this Worker (the Workers Custom
# Domains UI handles this automatically when you add the domain).
routes = [
  { pattern = "callback.babulashotsrd.com/*", custom_domain = true }
]

[observability]
enabled = true

# No bindings needed: MailChannels free tier requires no API key for
# Cloudflare Workers (sender domain SPF/DKIM must allow MailChannels).
#
# Deploy with:
#   cd worker && npx wrangler deploy
